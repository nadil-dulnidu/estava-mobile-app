services:
  - type: web
    name: estava-mobile-app
    runtime: node
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
